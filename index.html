<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hannah</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #c1b0d8;
      --blush: #361c56;
      --rose: #8f6ac0;
      --deep: #32273d;
      --gold: #916ec9;
      --soft: #e8def5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--cream);
      color: var(--deep);
      font-family: 'Noto Serif SC', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 顶部装饰线 */
    .top-bar {
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--blush), var(--rose), var(--gold), var(--rose), var(--blush));
    }

    /* 主容器 */
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 24px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 标题区域 */
    .header {
      text-align: center;
      padding: 48px 0 32px;
      animation: fadeDown 0.8s ease both;
    }

    .header .en-name {
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      font-weight: 700;
      color: var(--deep);
      letter-spacing: 4px;
      line-height: 1;
    }

    .header .en-name span {
      color: var(--rose);
    }

    .header .subtitle {
      margin-top: 10px;
      font-size: 13px;
      letter-spacing: 6px;
      color: var(--gold);
      text-transform: uppercase;
    }

    /* 分隔装饰 */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0 28px;
      animation: fadeIn 1s 0.3s ease both;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--blush));
    }

    .divider-line.right {
      background: linear-gradient(to left, transparent, var(--blush));
    }

    .divider-diamond {
      width: 8px;
      height: 8px;
      background: var(--rose);
      transform: rotate(45deg);
    }

    /* 照片区域 */
    .photo-wrapper {
      position: relative;
      width: 220px;
      height: 220px;
      margin-bottom: 36px;
      animation: fadeUp 0.9s 0.2s ease both;
    }

    .photo-bg {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blush), var(--gold));
      opacity: 0.5;
    }

    .photo-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid var(--rose);
      opacity: 0.4;
    }

    .photo-img {
      position: relative;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 4px solid white;
      box-shadow: 0 12px 40px rgba(192, 119, 106, 0.25);
      /* 占位背景 */
      background: linear-gradient(135deg, #f5d5c8 0%, #e8b4a2 50%, #d4937f 100%);
    }

    /* 占位头像图标 */
    .photo-placeholder {
      position: relative;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 4px solid rgb(255, 255, 255);
      box-shadow: 0 12px 40px rgba(106, 192, 192, 0.25);
      background: linear-gradient(135deg, #dcc8f5 0%, #c0a2e8 50%, #ab7fd4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .photo-placeholder svg {
      width: 110px;
      height: 110px;
      opacity: 0.6;
    }

    /* 自我介绍卡片 */
    .bio-card {
      background: white;
      border-radius: 20px;
      padding: 28px 24px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(192, 119, 106, 0.1);
      border: 1px solid rgba(232, 196, 176, 0.4);
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.9s 0.4s ease both;
    }

    .bio-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--blush), var(--rose), var(--gold));
    }

    .bio-card .quote-mark {
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      color: var(--blush);
      line-height: 0.6;
      margin-bottom: 12px;
      display: block;
    }

    .bio-card p {
      font-size: 15px;
      line-height: 2;
      color: #6b4f48;
      font-weight: 300;
    }

    /* 标签 */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
    }

    .tag {
      background: var(--soft);
      color: var(--rose);
      font-size: 12px;
      padding: 4px 14px;
      border-radius: 20px;
      border: 1px solid var(--blush);
      letter-spacing: 1px;
    }

    /* 按钮 */
    .wechat-btn {
      margin-top: 36px;
      width: 100%;
      padding: 18px 0;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, var(--rose), #b5645a);
      color: white;
      font-size: 16px;
      font-family: 'Noto Serif SC', serif;
      letter-spacing: 3px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 8px 24px rgba(192, 119, 106, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.9s 0.6s ease both;
      position: relative;
      overflow: hidden;
    }

    .wechat-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      border-radius: 50px;
    }

    .wechat-btn:active {
      transform: scale(0.97);
      box-shadow: 0 4px 12px rgba(192, 119, 106, 0.4);
    }

    .wechat-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    /* 弹窗遮罩 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(61, 43, 39, 0.5);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    /* 弹窗 */
    .modal {
      background: white;
      border-radius: 24px;
      padding: 36px 28px 28px;
      width: 100%;
      max-width: 320px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(61, 43, 39, 0.25);
      transform: translateY(20px) scale(0.96);
      transition: transform 0.3s ease;
      position: relative;
    }

    .modal-overlay.active .modal {
      transform: translateY(0) scale(1);
    }

    .modal-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #4CAF50, #2e7d32);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .modal-icon svg {
      width: 32px;
      height: 32px;
    }

    .modal h3 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--deep);
      margin-bottom: 8px;
    }

    .modal p {
      font-size: 13px;
      color: #a08070;
      margin-bottom: 20px;
    }

    .wechat-id-box {
      background: var(--soft);
      border: 1px dashed var(--blush);
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 22px;
      font-weight: 700;
      color: var(--rose);
      letter-spacing: 2px;
      margin-bottom: 24px;
    }

    .modal-close {
      width: 100%;
      padding: 14px 0;
      border: 1.5px solid var(--blush);
      border-radius: 50px;
      background: transparent;
      color: var(--rose);
      font-family: 'Noto Serif SC', serif;
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .modal-close:active {
      background: var(--soft);
    }

    /* 底部 */
    .footer {
      margin-top: 48px;
      font-size: 11px;
      color: var(--blush);
      letter-spacing: 3px;
      text-align: center;
      animation: fadeIn 1.2s 0.8s ease both;
    }

    /* 动画 */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="top-bar"></div>

  <div class="container">

    <!-- 标题 -->
    <div class="header">
      <div class="en-name">H<span>anna</span>h</div>
      <div class="subtitle">Personal · Page</div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line right"></div>
    </div>

    <!-- 照片 -->
    <div class="photo-wrapper">
      <div class="photo-bg"></div>
      <div class="photo-ring"></div>
      <!-- 如果你有自己的照片，把下面这行的 src 换成你的图片路径，比如 src="photo.jpg" -->
      <!-- <img class="photo-img" src="你的照片.jpg" alt="Hannah" /> -->
      <!-- 没有照片时显示占位头像 -->
      <div class="photo-placeholder">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="36" r="20" fill="white" opacity="0.9"/>
          <ellipse cx="50" cy="85" rx="30" ry="20" fill="white" opacity="0.9"/>
        </svg>
      </div>
    </div>

    <!-- 自我介绍 -->
    <div class="bio-card">
      <span class="quote-mark">"</span>
      <p>
        你好，我是 Hannah 👋<br/>
        <!-- 请把下面这段话改成你自己的介绍 -->
        我的特长不好说 
        但兴趣爱好有很多
        运动美食不可辜负
        观星赏景陶冶情操
        摄影手工锻炼审美
        四处溜达自在逍遥
      </p>
      <div class="tags">
        <!-- 可以改成你自己的兴趣标签 -->
        <span class="tag">旅行</span>
        <span class="tag">摄影</span>
        <span class="tag">美食</span>
        <span class="tag">生活美学</span>
        <span class="tag">手工</span>
      </div>
    </div>

    <!-- 微信按钮 -->
    <button class="wechat-btn" onclick="openModal()">
      <svg class="wechat-icon" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M8.5 10.5a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm5 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/>
        <path d="M22 11.5c0-4.14-4.03-7.5-9-7.5S4 7.36 4 11.5c0 2.05.9 3.9 2.36 5.25L5.5 20l3.4-1.7c.97.33 2 .5 3.1.5 4.97 0 9-3.36 9-7.5z"/>
        <path fill="rgba(255,255,255,0.5)" d="M16 15.5c0 2.76-2.69 5-6 5-.9 0-1.74-.17-2.5-.47L4.5 21.5l.9-2.73C4.22 17.75 3.5 16.67 3.5 15.5c0-2.76 2.69-5 6-5s6 2.24 6 5z"/>
      </svg>
      联系我的微信
    </button>

    <div class="footer">MADE WITH ♡ BY HANNAH</div>

  </div>

  <!-- 弹窗 -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeOnBg(event)">
    <div class="modal" id="modal">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M8.5 10.5a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm5 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/>
          <path d="M22 11.5c0-4.14-4.03-7.5-9-7.5S4 7.36 4 11.5c0 2.05.9 3.9 2.36 5.25L5.5 20l3.4-1.7c.97.33 2 .5 3.1.5 4.97 0 9-3.36 9-7.5z"/>
        </svg>
      </div>
      <h3>我的微信号</h3>
      <p>长按或截图保存，添加我吧～</p>
      <!-- 把 xxxxxxxx 改成你真实的微信号 -->
      <div class="wechat-id-box">h23168_</div>
      <button class="modal-close" onclick="closeModal()">好的，知道啦 ✓</button>
    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById('modalOverlay').classList.add('active');
    }
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }
    function closeOnBg(e) {
      if (e.target === document.getElementById('modalOverlay')) {
        closeModal();
      }
    }
  </script>

</body>
</html>
